benchmark_suite:
  version: "1.1.0"
  truth_state: "DECLARED"
  regression_threshold_pct: 5
  tests:
    - id: "B001"
      name: "Required Artifact Presence"
      scoring: "pass_fail"
      pass_condition: "All required canonical artifacts exist"
    - id: "B002"
      name: "Truth-State Coverage"
      scoring: "percentage"
      pass_condition: "Critical YAML files contain truth_state declarations"
    - id: "B003"
      name: "Governance Rule Presence"
      scoring: "pass_fail"
      pass_condition: "governance_rules.yaml contains hard_rules and rollback_guard"
    - id: "B004"
      name: "Runtime Log Emission"
      scoring: "pass_fail"
      pass_condition: "heartbeat_log.jsonl exists and has at least one event"
    - id: "B005"
      name: "Portable Pack Readiness"
      scoring: "pass_fail"
      pass_condition: "latest_state_summary.md, reproduction_instructions.md, and known_limitations.md exist"
    - id: "B006"
      name: "State Snapshot Presence"
      scoring: "pass_fail"
      pass_condition: "state_snapshot.json exists after build_state_snapshot.ps1 or run_heartbeat.ps1"
    - id: "B007"
      name: "Environment Check Presence"
      scoring: "pass_fail"
      pass_condition: "environment_check_report.json exists after check_environment.ps1"
    - id: "B008"
      name: "Hash Inventory Presence"
      scoring: "pass_fail"
      pass_condition: "hash_inventory.txt exists after compile_pack.ps1"
